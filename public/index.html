<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#D4A574" />
    <meta name="description" content="Aplicación para gestionar un taller de costura con clientes, trabajos y medidas" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Taller de Costura" />
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/assets/images/icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/images/icon.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <link rel="shortcut icon" href="/assets/images/favicon.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Splash Screen para iOS -->
    <link rel="apple-touch-startup-image" href="/assets/images/splash-icon.png" />
    
    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/icon.png" />
    
    <!-- Status Bar Color para Android -->
    <meta name="theme-color" content="#D4A574" />
    
    <!-- Prevenir zoom en iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    
    <!-- Pantalla completa en iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <title>Taller de Costura</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      /* Prevenir comportamientos de iOS */
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      
      /* Deshabilitar zoom en inputs */
      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="number"],
      textarea,
      select {
        font-size: 16px;
      }
      
      /* Pantalla completa */
      body {
        position: fixed;
        overflow: hidden;
      }
      
      /* Safe area para notch */
      @supports (padding: max(0px)) {
        body {
          padding-left: max(0px, env(safe-area-inset-left));
          padding-right: max(0px, env(safe-area-inset-right));
          padding-top: max(0px, env(safe-area-inset-top));
          padding-bottom: max(0px, env(safe-area-inset-bottom));
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script>
      // Registrar Service Worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((registration) => {
              console.log("[PWA] Service Worker registered:", registration);
              
              // Detectar actualizaciones
              registration.addEventListener("updatefound", () => {
                const newWorker = registration.installing;
                newWorker.addEventListener("statechange", () => {
                  if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                    console.log("[PWA] New version available");
                    // Notificar al usuario que hay una actualización
                    if (window.confirm("Nueva versión disponible. ¿Deseas actualizar?")) {
                      newWorker.postMessage({ type: "SKIP_WAITING" });
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch((error) => {
              console.error("[PWA] Service Worker registration failed:", error);
            });
        });
      }
      
      // Detectar cambios en el service worker
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          console.log("[PWA] Service Worker controller changed");
          window.location.reload();
        });
      }
      
      // Detectar instalación de PWA
      let deferredPrompt;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log("[PWA] Install prompt available");
        
        // Mostrar botón de instalación si lo deseas
        const installButton = document.getElementById("install-button");
        if (installButton) {
          installButton.style.display = "block";
          installButton.addEventListener("click", async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              console.log("[PWA] User response:", outcome);
              deferredPrompt = null;
            }
          });
        }
      });
      
      // Detectar cuando la app está instalada
      window.addEventListener("appinstalled", () => {
        console.log("[PWA] App installed");
        deferredPrompt = null;
      });
      
      // Detectar si la app está en modo standalone (instalada)
      if (window.navigator.standalone === true) {
        console.log("[PWA] Running in standalone mode");
        document.documentElement.classList.add("pwa-standalone");
      }
      
      // Manejar conexión offline/online
      window.addEventListener("online", () => {
        console.log("[PWA] Online");
      });
      
      window.addEventListener("offline", () => {
        console.log("[PWA] Offline");
      });
    </script>
  </body>
</html>
